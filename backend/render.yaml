services:
  - type: web
    name: portfolio-chatbot-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GOOGLE_GEMINI_API_KEY
        prompt: true
      - key: FRONTEND_URL
        value: https://krushnatkhawale.github.io
      - key: NODE_ENV
        value: production
